version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: underworld-civ-postgres
    environment:
      POSTGRES_USER: underworld
      POSTGRES_PASSWORD: civ_secret
      POSTGRES_DB: underworld_civ
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U underworld -d underworld_civ"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: underworld-civ-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: underworld-civ-backend
    ports:
      - "8081:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=underworld
      - DB_PASSWORD=civ_secret
      - DB_NAME=underworld_civ
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=underworld_civ_jwt_secret_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: underworld-civ-frontend
    ports:
      - "3002:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
